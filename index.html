<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COIN 2026</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <script>
      if (document.referrer) {
        var el = document.createElement('a');
        el.href = '../index.html';
        el.textContent = '← Home';
        el.style.cssText = 'position:fixed;top:12px;left:12px;z-index:9999;background:rgba(22,27,34,0.85);border:1px solid rgba(255,255,255,0.12);color:#e6edf3;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;font-size:0.8rem;font-weight:600;padding:6px 14px;border-radius:8px;backdrop-filter:blur(8px)';
        document.body.appendChild(el);
      }
    </script>
    <div id="app">
      <header id="chrome"></header>
      <main id="stage">
        <div id="play-area">
          <canvas id="board"></canvas>
          <div id="message-strip"></div>
          <div id="overlay" hidden></div>
        </div>
        <aside id="hud"></aside>
      </main>
    </div>
    <div id="landscape-prompt">
      <div class="rotate-icon">📱</div>
      <div class="rotate-label">请将设备旋转至横屏</div>
      <div class="rotate-sub">Please rotate to landscape · 横向に回転してください</div>
      <div class="rotate-sub" style="margin-top:8px;font-size:12px">点击尝试全屏</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
